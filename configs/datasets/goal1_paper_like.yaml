name: goal1_paper_like
seed: 20260601
base: 10
output_dir: data/generated
write_parquet: false
schema_version: goal1.v1
splits:
  test_behavior:
    examples_per_slice_per_length: 16
    slice_examples_per_length:
      no_carry: 16
      isolated_carry: 16
      long_carry_chain: 16
      carry_distractor: 16
      random: 64
digit_lengths: [2, 4, 6]
slices:
  - no_carry
  - isolated_carry
  - long_carry_chain
  - carry_distractor
  - random
prompt_modes:
  - answer_only
  - free_cot
digit_formats:
  - standard
  - delimited
answer_formats:
  - standard
  - lsd
digit_delimiter: "|"
random_sampling:
  balance_carry_count: true
