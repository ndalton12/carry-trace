name: goal1_olmo3_real
seed: 13
dataset_path: data/generated/goal1_paper_like/examples.jsonl
output_dir: runs
runner:
  kind: hf
  device: auto
  dtype: bfloat16
  batch_size: 6
  trust_remote_code: false
  quantization: none
models:
  - name: olmo3-instruct-sft
    model_id: allenai/Olmo-3-7B-Instruct-SFT
  - name: olmo3-instruct-full
    model_id: allenai/Olmo-3-7B-Instruct
generation:
  max_new_tokens: 2048
  temperature: 0.6
  top_p: 0.95
  do_sample: true
  thinking_final_answer_tokens: 100
  force_close_thinking: false
