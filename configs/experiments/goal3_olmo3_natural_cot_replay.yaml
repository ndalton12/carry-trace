name: goal3_olmo3_natural_cot_replay
seed: 13
dataset_bundle_dir: data/generated/goal3_olmo3_natural_cot
output_dir: runs
runner:
  kind: hf
  device: auto
  dtype: bfloat16
  batch_size: 6
  trust_remote_code: false
  quantization: none
models:
  - name: olmo3-instruct-sft
    model_id: allenai/Olmo-3-7B-Instruct-SFT
  - name: olmo3-instruct-full
    model_id: allenai/Olmo-3-7B-Instruct
replay:
  enabled: true
  answer_cue: "\nFinal answer:"
  decode_locations:
    - prompt_final
    - cot_2_3
    - cot_end
  generation:
    max_new_tokens: 16
    temperature: 0.0
    top_p: 1.0
    do_sample: false
residual:
  enabled: false
