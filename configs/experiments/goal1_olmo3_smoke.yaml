name: goal1_olmo3_smoke
seed: 13
dataset_path: data/generated/goal1_smoke/examples.jsonl
output_dir: runs
max_examples: 8
splits:
  - smoke
prompt_modes:
  - answer_only
  - structured_column_cot
digit_formats:
  - standard
  - delimited
answer_formats:
  - standard
  - lsd
runner:
  kind: hf
  device: auto
  dtype: bfloat16
  batch_size: 1
  trust_remote_code: false
  quantization: none
models:
  - name: olmo3-think
    model_id: allenai/Olmo-3-7B-Think
  - name: olmo3-instruct
    model_id: allenai/Olmo-3-7B-Instruct
generation:
  max_new_tokens: 1024
  temperature: 0.0
  top_p: 0.5
  do_sample: true
  thinking_final_answer_tokens: 100
  force_close_thinking: true
